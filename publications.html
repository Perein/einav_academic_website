<!DOCTYPE html>
<html lang="en">

<head>
  <!-- technical meta -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- seo -->
  <title>Publications | Einav Peretz-Andersson</title>
  <meta name="description"
    content="Academic publications, presentations, and abstracts by Einav Peretz-Andersson." />
  <meta name="keywords"
    content="Einav Peretz-Andersson, publications, academic papers, AI transformation, explainable AI, AI governance" />
  <meta name="author" content="Einav Peretz-Andersson" />
  <link href="/img/favicon.ico" rel="icon" type="image/x-icon" />

  <!-- font awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

  <!-- bootstrap -->
  <link rel="stylesheet" crossorigin="anonymous"
    href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
    integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk">

  <!-- styles -->
  <link href="/css/main.css" rel="stylesheet">
  <link href="/css/descriptionTrim.css" rel="stylesheet">
</head>

<body>

  <!-- HEADER -->
  <header class="header" id="header"></header>

  <!-- MAIN -->
  <main class="content" id="main_section">

    <div class="academic-papers-container">
      <div class="academic-papers-header-section">
        <h1>Academic publications</h1>
        <p class="top_p">Published academic papers, presentations, and abstracts.</p>

       <div class="academic-papers-order-filter-wrapper"
     onclick="document.academicPublications.showOrderOptions()">
  <h5 class="publications-order-by-btn">Order By</h5>
</div>

        <form id="orderOptions">
          <div class="personal-row wrap">
            <button type="button" id="sort-btn-year"
              onclick="document.academicPublications.changeSort('year')">Year</button>
            <button type="button" id="sort-btn-type"
              onclick="document.academicPublications.changeSort('type')">Type</button>
            <button type="button" id="sort-btn-topic"
              onclick="document.academicPublications.changeSort('topic')">Topic</button>
          </div>
        </form>

       <div class="academic-papers-order-filter-wrapper"
     onclick="document.academicPublications.showFilterOptions()">
  <h5 class="publications-filter-btn">Filter</h5>
</div>

        <div class="academic-papers-filters w-100" id="academic_papers_filters">
          <form id="FilterOptions">
            <div class="personal-row wrap">
              <select id="year-filter" class="filter"
                onchange="document.academicPublications.changeFilterYear();">
                <option>Year</option>
              </select>

              <select id="type-filter" class="filter"
                onchange="document.academicPublications.changeFilterType();">
                <option>Type</option>
              </select>

              <select id="topic-filter" class="filter"
                onchange="document.academicPublications.changeFilterTopic();">
                <option>Topic</option>
              </select>

              <a id="reset-btn"></a>
            </div>
          </form>
        </div>
      </div>

      <hr class="publications-hr">

      <div class="academic-papers-body-section" id="publications-body"></div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="footer" id="footer"></footer>

  <!-- JS -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
    integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
    crossorigin="anonymous"></script>

  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"
    integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
    crossorigin="anonymous"></script>

  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"
    integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI"
    crossorigin="anonymous"></script>

  <script src="/js/main.js"></script>
  <script src="/js/pages/academic-publications.js" type="module"></script>

</body>

</html>
